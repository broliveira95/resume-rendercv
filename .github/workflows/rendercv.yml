name: RenderCV Auto-Render

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Bruno_de_Oliveira_CV.yaml
      - .github/workflows/rendercv.yml

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install RenderCV
        run: |
          python -m pip install --upgrade pip
          pip install rendercv

      - name: Render CV
        run: |
          rendercv render Bruno_de_Oliveira_CV.yaml

      - name: Commit rendered updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rendercv_output/ Bruno_de_Oliveira.md
          if git diff --cached --quiet; then
            echo "No rendered changes to commit."
          else
            git commit -m "chore: auto-render resume output"
            git push
          fi
